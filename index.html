
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>収入印紙チェッカー｜蒲田工業</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=DM+Mono:wght@500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:#F4F2EE;color:#1C1B18;min-height:100vh;padding:28px 16px 60px;}
  .page{max-width:860px;margin:0 auto;}
  h1{font-size:19px;font-weight:500;letter-spacing:-.02em;margin-bottom:2px;}
  .lead{font-size:13px;color:#888780;margin-bottom:20px;}
  .columns{display:grid;grid-template-columns:1fr 230px;gap:16px;align-items:start;}
  @media(max-width:640px){.columns{grid-template-columns:1fr;}}

  /* 対象書類バッジ */
  .doc-badge{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #C0DDA8;border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .doc-badge-icon{width:34px;height:34px;border-radius:9px;background:#EAF3DE;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .doc-badge-name{font-size:13px;font-weight:500;color:#1C1B18;display:block;}
  .doc-badge-hint{font-size:11px;color:#A0A09A;margin-top:1px;display:block;}

  /* 金額入力 */
  .amount-lbl{font-size:10px;font-weight:500;letter-spacing:.08em;color:#B0AEA8;text-transform:uppercase;margin-bottom:6px;}
  .amount-row{display:flex;align-items:baseline;gap:5px;margin-bottom:4px;}
  .yen{font-size:24px;font-weight:500;color:#C0BDB6;}
  .amount-input{flex:1;font-size:40px;font-family:'DM Mono',monospace;font-weight:500;border:none;border-bottom:2px solid #E2DFD8;background:transparent;color:#1C1B18;padding:2px 0;outline:none;transition:border-color .15s;min-width:0;}
  .amount-input:focus{border-bottom-color:#888780;}
  .amount-input::placeholder{color:#D8D5CE;}
  .amount-fmt{font-size:12px;color:#A0A09A;font-family:'DM Mono',monospace;min-height:16px;margin-bottom:10px;}

  /* 金額ショートカット */
  .shortcuts{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
  .sc-btn{font-size:11px;font-family:inherit;padding:5px 10px;border-radius:7px;border:0.5px solid #D8D5CE;background:#fff;cursor:pointer;color:#5f5e5a;transition:background .12s;}
  .sc-btn:hover{background:#F0EDE6;}
  .sc-btn.active{background:#1C1B18;color:#fff;border-color:#1C1B18;}

  /* 結果 */
  .result{border-radius:14px;padding:18px;display:none;margin-bottom:12px;}
  .result.show{display:block;}
  .result.required{background:#FDEAEA;}
  .result.exempt{background:#E6F4EC;}
  .result.check{background:#FFF8E6;}
  .result-badge{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.07em;padding:2px 9px;border-radius:999px;margin-bottom:8px;}
  .required .result-badge{background:#F7C1C1;color:#791F1F;}
  .exempt  .result-badge{background:#9FE1CB;color:#085041;}
  .check   .result-badge{background:#FAC775;color:#412402;}
  .result-amount{font-size:36px;font-weight:500;letter-spacing:-.03em;font-family:'DM Mono',monospace;line-height:1;margin-bottom:8px;}
  .required .result-amount{color:#791F1F;}
  .exempt  .result-amount{color:#085041;}
  .check   .result-amount{color:#412402;}
  .result-note{font-size:12px;line-height:1.8;white-space:pre-wrap;}
  .required .result-note{color:#A32D2D;}
  .exempt  .result-note{color:#0F6E56;}
  .check   .result-note{color:#633806;}
  .result-foot{display:flex;align-items:flex-start;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,.08);}
  .result-basis{font-size:10px;line-height:1.6;opacity:.65;flex:1;}
  .required .result-basis{color:#A32D2D;}
  .exempt  .result-basis{color:#0F6E56;}
  .check   .result-basis{color:#633806;}
  .copy-btn{font-size:11px;font-family:inherit;padding:4px 12px;border-radius:6px;border:1px solid;background:transparent;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0;}
  .required .copy-btn{border-color:#A32D2D;color:#A32D2D;}
  .exempt  .copy-btn{border-color:#0F6E56;color:#0F6E56;}
  .check   .copy-btn{border-color:#633806;color:#633806;}



  /* 右カラム：早見表 */
  .ref-card{background:#fff;border-radius:14px;border:.5px solid #E2DFD8;overflow:hidden;position:sticky;top:24px;margin-bottom:12px;}
  .ref-head{padding:12px 14px 8px;border-bottom:.5px solid #E2DFD8;}
  .ref-head-title{font-size:12px;font-weight:500;}
  .ref-head-sub{font-size:10px;color:#A0A09A;margin-top:2px;}
  .ref-row{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;font-size:10px;border-bottom:.5px solid #F0EDE6;}
  .ref-row:last-child{border-bottom:none;}
  .ref-row.hi{background:#FFF8E6;}
  .ref-range{color:#6A6A65;}
  .ref-stamp{font-family:'DM Mono',monospace;font-weight:500;font-size:11px;}
  .ref-foot{font-size:10px;color:#A0A09A;padding:7px 14px 10px;line-height:1.5;}



  .disclaimer{font-size:10px;color:#C0BDB6;line-height:1.7;margin-top:12px;}
</style>
</head>
<body>
<div class="page">
  <h1>収入印紙チェッカー</h1>
  <p class="lead">金額を入力するだけで即判定 — 軽減税率（令和9年3月31日まで）適用済み</p>

  <div class="columns">
    <!-- 左：判定エリア -->
    <div>
      <!-- 対象書類（固定表示） -->
      <div class="doc-badge">
        <div class="doc-badge-icon">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="4" y="2" width="11" height="14" rx="2" stroke="#639922" stroke-width="1.4"/><path d="M7 7h6M7 10h6M7 13h4" stroke="#639922" stroke-width="1.2" stroke-linecap="round"/><rect x="11" y="11" width="5.5" height="5.5" rx="1.2" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/></svg>
        </div>
        <div>
          <span class="doc-badge-name">注文請書・工事請負契約書</span>
          <span class="doc-badge-hint">受注側が発行・建設／設備／土木工事</span>
        </div>
      </div>

      <!-- 金額入力 -->
      <div class="amount-lbl">金額（税抜）</div>
      <div class="amount-row">
        <span class="yen">¥</span>
        <input class="amount-input" id="amountInput" type="number" placeholder="0" min="0" oninput="judge()" autofocus>
      </div>
      <div class="amount-fmt" id="amountFmt"></div>

      <!-- ショートカット -->
      <div class="shortcuts" id="shortcuts"></div>

      <!-- 結果 -->
      <div class="result" id="result">
        <span class="result-badge" id="rBadge"></span>
        <div class="result-amount" id="rAmount"></div>
        <div class="result-note"   id="rNote"></div>
        <div class="result-foot">
          <div class="result-basis" id="rBasis"></div>
          <button class="copy-btn" id="copyBtn" onclick="copyResult()">コピー</button>
        </div>
      </div>


      <p class="disclaimer">※ 参考文献に基づく参考判定です。最終確認は税理士等にご相談ください。</p>
    </div>

    <!-- 右：早見表 + 参考文献 -->
    <div>
      <div class="ref-card">
        <div class="ref-head">
          <div class="ref-head-title">印紙税額 早見表</div>
          <div class="ref-head-sub">軽減後の税率（〜令和9年3月31日）</div>
        </div>
        <div id="refBody"></div>
        <div class="ref-foot">出典：国税庁「建設工事請負契約書の印紙税軽減措置の延長について」令和6年4月改訂</div>
      </div>


    </div>
  </div>
</div>

<script>
/* ============================================================
   ★ 編集するのはここだけ
   ============================================================ */

// ── よく使う金額ショートカット（税抜・円） ──────────────────
// 追加・変更はここだけ
const SHORTCUTS = [
  { label: '100万',   value: 1000000  },
  { label: '300万',   value: 3000000  },
  { label: '500万',   value: 5000000  },
  { label: '1,000万', value: 10000000 },
  { label: '3,000万', value: 30000000 },
  { label: '5,000万', value: 50000000 },
];

// ── 税額表 ───────────────────────────────────────────────────
// 書類の種類が増えたらここに追加する
// min: 適用下限（円）以上  max: 適用上限（円）以下
// ex:true = 非課税  s = 印紙税額（円）  l = 表示ラベル
const TAX_TABLES = {
  // 注文請書・工事請負契約書（第2号文書・軽減税率）
  rc2: [
    { min: 0,          max: 9999,        ex: true, l: '1万円未満'              },
    { min: 10000,      max: 1000000,     s: 200,   l: '1万円以上〜100万円以下'  },
    { min: 1000001,    max: 2000000,     s: 500,   l: '100万円超〜200万円以下'  },
    { min: 2000001,    max: 3000000,     s: 1000,  l: '200万円超〜300万円以下'  },
    { min: 3000001,    max: 5000000,     s: 5000,  l: '300万円超〜500万円以下'  },
    { min: 5000001,    max: 10000000,    s: 10000, l: '500万円超〜1,000万円以下'},
    { min: 10000001,   max: 50000000,    s: 30000, l: '1,000万円超〜5,000万円以下'},
    { min: 50000001,   max: 100000000,   s: 60000, l: '5,000万円超〜1億円以下'  },
    { min: 100000001,  max: 500000000,   s: 160000,l: '1億円超〜5億円以下'      },
    { min: 500000001,  max: 1000000000,  s: 320000,l: '5億円超〜10億円以下'     },
    { min: 1000000001, max: 5000000000,  s: 480000,l: '10億円超〜50億円以下'    },
    { min: 5000000001, max: Infinity,    s: 480000,l: '50億円超'               },
  ],
  // 書類の種類を追加する場合はここに新しいテーブルを追加
};



// ── 履歴の最大件数（不使用）───────────────────────────────

/* ============================================================
   ロジック（通常は編集不要）
   ============================================================ */
let lastTxt = '', activeScBtn = null;

function build() {
  // ショートカット
  const sc = document.getElementById('shortcuts');
  SHORTCUTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sc-btn'; btn.textContent = s.label;
    btn.onclick = () => {
      document.getElementById('amountInput').value = s.value;
      if (activeScBtn) activeScBtn.classList.remove('active');
      btn.classList.add('active'); activeScBtn = btn;
      judge();
    };
    sc.appendChild(btn);
  });

  // 早見表
  const body = document.getElementById('refBody');
  TAX_TABLES.rc2.forEach(row => {
    const div = document.createElement('div'); div.className = 'ref-row';
    const stamp = row.ex ? '非課税' : '¥' + row.s.toLocaleString('ja-JP');
    div.innerHTML = `<span class="ref-range">${row.l}</span><span class="ref-stamp" style="${row.ex ? 'color:#3B6D11' : ''}">${stamp}</span>`;
    body.appendChild(div);
  });


}

function judge() {
  const amt = parseInt(document.getElementById('amountInput').value || '0', 10);
  document.getElementById('amountFmt').textContent = amt > 0 ? '¥' + amt.toLocaleString('ja-JP') : '';

  // ショートカットのアクティブ状態を同期
  if (activeScBtn) {
    const matched = SHORTCUTS.find(s => s.value === amt);
    if (!matched) { activeScBtn.classList.remove('active'); activeScBtn = null; }
  }

  // 早見表のハイライト
  document.querySelectorAll('.ref-row').forEach(r => r.classList.remove('hi'));

  if (!amt || amt <= 0) { document.getElementById('result').className = 'result'; return; }

  const row = TAX_TABLES.rc2.find(r => amt >= r.min && amt <= r.max);
  if (!row) return;

  // 早見表ハイライト
  const refRows = document.querySelectorAll('.ref-row');
  const idx = TAX_TABLES.rc2.indexOf(row);
  if (refRows[idx]) refRows[idx].classList.add('hi');

  if (row.ex) {
    show('exempt', '非課税', `金額が${row.l}のため非課税です。`, '印紙税法別表第一 第2号文書。1万円未満は非課税。', amt);
    return;
  }
  show('required', '¥' + row.s.toLocaleString('ja-JP'),
    `注文請書・工事請負契約書（${row.l}）\n¥${row.s.toLocaleString('ja-JP')} の収入印紙が必要です。\n軽減税率適用（〜令和9年3月31日）`,
    '印紙税法別表第一 第2号文書。租税特別措置法第91条により令和9年3月31日まで軽減税率適用。', amt);
}

function show(type, amt, note, basis, rawAmt) {
  const el = document.getElementById('result'); el.className = 'result show ' + type;
  document.getElementById('rBadge').textContent  = { required:'課税対象', exempt:'非課税', check:'要確認' }[type];
  document.getElementById('rAmount').textContent = amt;
  document.getElementById('rNote').textContent   = note;
  document.getElementById('rBasis').textContent  = '根拠：' + basis;
  document.getElementById('copyBtn').textContent = 'コピー';
  lastTxt = `【収入印紙 判定結果】\n書類：注文請書・工事請負契約書\n金額：¥${rawAmt.toLocaleString('ja-JP')}\n結果：${amt}\n${note}`;
}

function copyResult() {
  if (!lastTxt) return;
  navigator.clipboard.writeText(lastTxt).then(() => {
    document.getElementById('copyBtn').textContent = 'コピー済み ✓';
    setTimeout(() => { document.getElementById('copyBtn').textContent = 'コピー'; }, 2000);
  });
}

build();
// ページ読み込み時に金額入力にフォーカス
window.addEventListener('load', () => document.getElementById('amountInput').focus());
</script>
</body>
</html>
